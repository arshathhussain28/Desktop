<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Labels - Orphan Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: #0f172a;
      min-height: 100vh;
      padding: 40px 20px;
      color: #f8fafc;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Background Orbs */
    .bg-orbs {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.4;
      animation: float 15s infinite ease-in-out alternate;
    }

    .orb-1 {
      width: 500px;
      height: 500px;
      background: #3b82f6;
      /* Blue */
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 400px;
      height: 400px;
      background: #8b5cf6;
      /* Violet */
      bottom: -100px;
      right: -100px;
      animation-delay: -5s;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: #ec4899;
      /* Pink */
      top: 30%;
      left: 60%;
      transform: translate(-50%, -50%);
      animation-delay: -2s;
      opacity: 0.2;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(40px, 60px) scale(1.1);
      }
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 1;
      overflow: hidden;
      animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes slideUpFade {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      background: rgba(15, 23, 42, 0.4);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 40px;
      text-align: center;
      position: relative;
    }

    .header-content {
      position: relative;
      z-index: 1;
    }

    .logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 20px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
      position: relative;
    }

    .logo::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0));
      z-index: -1;
    }

    h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 16px;
      color: #94a3b8;
      font-weight: 400;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
      padding: 16px 32px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease;
    }

    .stat:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.05);
    }

    .stat-number {
      font-size: 32px;
      font-weight: 700;
      display: block;
      background: linear-gradient(135deg, #f8fafc, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .content {
      padding: 40px;
    }

    .search-container {
      position: relative;
      margin-bottom: 32px;
      max-width: 400px;
    }

    .search-input {
      width: 100%;
      padding: 16px 24px 16px 52px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      font-size: 16px;
      color: #f8fafc;
      transition: all 0.3s ease;
    }

    .search-input::placeholder {
      color: #475569;
    }

    .search-input:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      font-size: 18px;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search-results {
      font-size: 14px;
      color: #94a3b8;
      margin-top: 12px;
      font-weight: 500;
      padding-left: 12px;
    }

    .clear-search {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #94a3b8;
      font-size: 16px;
      cursor: pointer;
      opacity: 0;
      transition: all 0.2s ease;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .clear-search:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #f8fafc;
    }

    .search-input:focus+.clear-search,
    .search-input:not(:placeholder-shown)+.clear-search {
      opacity: 1;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .export-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: rgba(16, 185, 129, 0.1);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .export-btn:hover {
      background: rgba(16, 185, 129, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(16, 185, 129, 0.3);
    }

    .export-btn svg {
      width: 18px;
      height: 18px;
    }

    .table-container {
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      overflow-x: auto;
      margin-bottom: 32px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background: rgba(255, 255, 255, 0.02);
      padding: 20px 24px;
      font-weight: 600;
      color: #94a3b8;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    td {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
      vertical-align: middle;
      transition: background 0.2s ease;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tbody tr {
      transition: all 0.3s ease;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    tr.hidden {
      display: none;
    }

    .label-id {
      font-family: 'Consolas', 'Monaco', monospace;
      font-weight: 600;
      color: #f8fafc;
      font-size: 15px;
    }

    .generated-id {
      font-family: 'Consolas', 'Monaco', monospace;
      font-weight: 500;
      background: rgba(0, 0, 0, 0.2);
      color: #94a3b8;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: inline-block;
      max-width: 200px;
      word-break: break-all;
    }

    .zone {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-block;
      border: 1px solid transparent;
    }

    /* Vibrant Glowing Pill Badges */
    .zone-1 {
      background: rgba(59, 130, 246, 0.1);
      color: #60a5fa;
      border-color: rgba(59, 130, 246, 0.2);
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.1);
    }

    .zone-2 {
      background: rgba(245, 158, 11, 0.1);
      color: #fbbf24;
      border-color: rgba(245, 158, 11, 0.2);
      box-shadow: 0 0 10px rgba(245, 158, 11, 0.1);
    }

    .zone-3 {
      background: rgba(16, 185, 129, 0.1);
      color: #34d399;
      border-color: rgba(16, 185, 129, 0.2);
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
    }

    .zone-4 {
      background: rgba(236, 72, 153, 0.1);
      color: #f472b6;
      border-color: rgba(236, 72, 153, 0.2);
      box-shadow: 0 0 10px rgba(236, 72, 153, 0.1);
    }

    .date {
      color: #64748b;
      font-size: 14px;
    }

    .no-data {
      text-align: center;
      padding: 80px 40px;
      color: #64748b;
    }

    .no-data-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      max-width: 280px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.05);
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 500;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .loading {
      text-align: center;
      padding: 80px;
      color: #94a3b8;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: #3b82f6;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .actions-cell {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .print-btn {
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .print-btn:hover {
      background: rgba(59, 130, 246, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
    }

    .delete-btn {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .delete-btn:hover {
      background: rgba(239, 68, 68, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.15);
    }

    @media (max-width: 768px) {
      .container {
        margin: 0;
        border-radius: 16px;
      }

      .header {
        padding: 32px 20px;
      }

      h1 {
        font-size: 28px;
      }

      .content {
        padding: 32px 20px;
      }

      .stats {
        gap: 16px;
      }

      .stat {
        padding: 12px 20px;
        flex: 1;
        min-width: 120px;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .search-container {
        max-width: 100%;
        margin-bottom: 12px;
      }

      .search-results {
        position: static;
        margin-bottom: 16px;
      }

      th,
      td {
        padding: 16px 12px;
      }

      .generated-id {
        font-size: 12px;
        max-width: 120px;
      }
    }
  </style>
</head>

<body>
  <!-- Animated Background -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="container">
    <div class="header">
      <div class="header-content">
        <div class="logo">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
            </path>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
            <line x1="12" y1="22.08" x2="12" y2="12"></line>
          </svg>
        </div>
        <h1>Saved Labels</h1>
        <p class="subtitle">All your tracked labels at a glance</p>
        <div class="stats">
          <div class="stat">
            <span class="stat-number" id="totalLabels">0</span>
            <span id="visibleLabels" style="font-size: 14px; opacity: 0.9; color: #94a3b8;">Total Labels</span>
          </div>
          <div class="stat">
            <span class="stat-number" id="zone1Count"
              style="background: linear-gradient(135deg, #60a5fa, #3b82f6); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">0</span>
            <span style="font-size: 14px; opacity: 0.9; color: #94a3b8;">Zone 1</span>
          </div>
          <div class="stat">
            <span class="stat-number" id="zone2Count"
              style="background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">0</span>
            <span style="font-size: 14px; opacity: 0.9; color: #94a3b8;">Zone 2</span>
          </div>
          <div class="stat">
            <span class="stat-number" id="zone3Count"
              style="background: linear-gradient(135deg, #34d399, #10b981); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">0</span>
            <span style="font-size: 14px; opacity: 0.9; color: #94a3b8;">Zone 3</span>
          </div>
          <div class="stat">
            <span class="stat-number" id="zone4Count"
              style="background: linear-gradient(135deg, #f472b6, #ec4899); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">0</span>
            <span style="font-size: 14px; opacity: 0.9; color: #94a3b8;">Zone 4</span>
          </div>
        </div>
      </div>
    </div>
    <div class="content">
      <div class="toolbar">
        <div class="search-container" style="flex: 1; min-width: 250px; max-width: 400px; margin-bottom: 0;">
          <div class="search-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </div>
          <input type="text" class="search-input" id="searchInput" placeholder="Search by Label ID or Generated...">
          <button class="clear-search" id="clearSearch" title="Clear search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
          <div class="search-results" id="searchResults" style="display: none;"></div>
        </div>
        <button class="export-btn" id="exportBtn" onclick="exportToCSV()" title="Export visible labels to CSV">
          <svg viewBox="0 0 24 24" fill="none" class="lucide lucide-file-down" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"></path>
            <path d="M14 2v4a2 2 0 0 0 2 2h4"></path>
            <path d="M12 18v-6"></path>
            <path d="m9 15 3 3 3-3"></path>
          </svg>
          Export CSV
        </button>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Label ID</th>
              <th>Zone</th>
              <th>Date Added</th>
              <th>Generated ID</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="labelTable">
            <tr>
              <td colspan="5" class="loading">
                <div class="spinner"></div>
                <div>Retrieving label data...</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <a href="index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Dashboard
      </a>
    </div>
  </div>
  <script>
    const API_URL = "/labels";
    let allLabels = [];

    async function deleteLabel(id) {
      if (!confirm('Are you sure you want to delete this label?')) return;

      try {
        const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error(`API failed: ${res.status}`);

        allLabels = allLabels.filter(label => label._id !== id);
        const query = document.getElementById('searchInput').value;
        filterLabels(query);
        updateStats(allLabels);
      } catch (error) {
        console.error('Error deleting label:', error);
        alert('Failed to delete label. Please try again.');
      }
    }

    async function fetchWithTimeout(url, options = {}, timeout = 30000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      try {
        const res = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(id);
        return res;
      } catch (e) {
        clearTimeout(id);
        throw e;
      }
    }

    async function loadLabels(attempt = 1) {
      const maxAttempts = 3;
      try {
        const isWakingUp = attempt > 1;
        document.getElementById("labelTable").innerHTML = `
          <tr>
            <td colspan="5" class="loading">
              <div class="spinner"></div>
              <div>${isWakingUp
            ? `⏳ Server is waking up... (attempt ${attempt}/${maxAttempts}, please wait)`
            : 'Retrieving labels data...'}</div>
            </td>
          </tr>
        `;
        const res = await fetchWithTimeout(API_URL, {}, 25000);
        if (!res.ok) throw new Error(`API failed: ${res.status}`);
        allLabels = await res.json();
        updateStats(allLabels);
        renderLabels(allLabels);
      } catch (error) {
        console.error(`Attempt ${attempt} failed:`, error);
        if (attempt < maxAttempts) {
          // Wait 5s then retry — handles Render cold start
          setTimeout(() => loadLabels(attempt + 1), 5000);
        } else {
          document.getElementById("labelTable").innerHTML = `
            <tr>
              <td colspan="5" class="no-data">
                <div class="no-data-icon">
                  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto;">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                  </svg>
                </div>
                <div style="font-size: 18px; margin-bottom: 8px; font-weight: 600; color: #ef4444;">Could not load labels</div>
                <div style="margin-bottom:16px;">Server may be offline. Please wait a minute and try again.</div>
                <button onclick="loadLabels(1)" style="padding:10px 24px;background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.3);border-radius:8px;cursor:pointer;font-size:15px;font-family:inherit;">
                  🔄 Retry
                </button>
              </td>
            </tr>
          `;
        }
      }
    }
    function renderLabels(labels) {
      const table = document.getElementById("labelTable");
      if (labels.length === 0) {
        table.innerHTML = `
          <tr>
            <td colspan="5" class="no-data">
              <div class="no-data-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto;">
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
              </div>
              <div style="font-size: 18px; margin-bottom: 8px; font-weight: 500; color: #e2e8f0;">No matching labels found</div>
              <div style="font-size: 14px;">Try refining your search term.</div>
            </td>
          </tr>
        `;
        return;
      }
      table.innerHTML = "";
      labels.forEach((label, index) => {
        const row = document.createElement("tr");
        const zoneClass = `zone zone-${label.zone.replace(' ', '').toLowerCase()}`;
        row.innerHTML = `
          <td><span class="label-id">${label.labelId}</span></td>
          <td><span class="${zoneClass}">${label.zone}</span></td>
          <td><span class="date">${new Date(label.createdAt).toLocaleString(undefined, {
          year: 'numeric', month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        })}</span></td>
          <td><span class="generated-id">${label.generatedId || 'N/A'}</span></td>
          <td>
            <div class="actions-cell">
              <button onclick="printLabel('${label.generatedId || ''}', '${label.createdAt}')" class="print-btn" title="Print Label">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 6 2 18 2 18 9"></polyline>
                  <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                  <rect x="6" y="14" width="12" height="8"></rect>
                </svg>
              </button>
              <button onclick="deleteLabel('${label._id}')" class="delete-btn" title="Delete Label">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  <line x1="10" y1="11" x2="10" y2="17"></line>
                  <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
              </button>
            </div>
          </td>
        `;
        table.appendChild(row);
      });
      // Add smoother entrance animation
      const rows = table.querySelectorAll('tr');
      rows.forEach((row, index) => {
        row.style.opacity = '0';
        row.style.transform = 'translateY(15px)';
        setTimeout(() => {
          row.style.transition = 'all 0.4s ease';
          row.style.opacity = '1';
          row.style.transform = 'translateY(0)';
        }, index * 50); // Staggered delay
      });
    }
    function filterLabels(query) {
      if (!query.trim()) {
        renderLabels(allLabels);
        updateVisibleCount(allLabels.length);
        updateSearchResults('', 0);
        return;
      }
      const filtered = allLabels.filter(label =>
        label.labelId.toLowerCase().includes(query.toLowerCase()) ||
        (label.generatedId && label.generatedId.toLowerCase().includes(query.toLowerCase()))
      );
      renderLabels(filtered);
      updateVisibleCount(filtered.length);
      updateSearchResults(query, filtered.length);
    }
    function updateSearchResults(query, count) {
      const resultsEl = document.getElementById('searchResults');
      if (query.trim()) {
        resultsEl.textContent = `Found ${count} result${count !== 1 ? 's' : ''} for "${query}"`;
        resultsEl.style.display = 'block';
      } else {
        resultsEl.style.display = 'none';
      }
    }
    function updateVisibleCount(count) {
      document.getElementById('visibleLabels').textContent =
        allLabels.length === count ? 'Total Labels' : `${count} Visible`;
    }
    function updateStats(labels) {
      document.getElementById("totalLabels").textContent = labels.length;
      const zoneCounts = { 'Zone 1': 0, 'Zone 2': 0, 'Zone 3': 0, 'Zone 4': 0 };
      labels.forEach(label => {
        if (zoneCounts[label.zone] !== undefined) {
          zoneCounts[label.zone]++;
        }
      });
      document.getElementById("zone1Count").textContent = zoneCounts['Zone 1'];
      document.getElementById("zone2Count").textContent = zoneCounts['Zone 2'];
      document.getElementById("zone3Count").textContent = zoneCounts['Zone 3'];
      document.getElementById("zone4Count").textContent = zoneCounts['Zone 4'];
    }
    // Search functionality
    document.getElementById('searchInput').addEventListener('input', function (e) {
      const query = e.target.value;
      filterLabels(query);
    });
    document.getElementById('clearSearch').addEventListener('click', function () {
      document.getElementById('searchInput').value = '';
      filterLabels('');
      document.getElementById('searchInput').focus();
    });
    // Clear search when clicking outside
    document.addEventListener('click', function (e) {
      if (!e.target.closest('.search-container')) {
        // Optional: clear search on outside click
      }
    });

    // CSV Export Logic
    function exportToCSV() {
      // Determine columns
      const headers = ['Label ID', 'Zone', 'Date Added', 'Generated ID'];

      // Determine what to export: visible rows
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const labelsToExport = query
        ? allLabels.filter(l => l.labelId.toLowerCase().includes(query) || (l.generatedId && l.generatedId.toLowerCase().includes(query)))
        : allLabels;

      if (labelsToExport.length === 0) {
        alert("No labels to export.");
        return;
      }

      // Format CSV rows
      const rows = labelsToExport.map(label => {
        const dateStr = new Date(label.createdAt).toLocaleString(undefined, {
          year: 'numeric', month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        }).replace(/,/g, ''); // Remove commas to prevent breaking CSV layout

        return [
          `"${label.labelId}"`,
          `"${label.zone}"`,
          `"${dateStr}"`,
          `"${label.generatedId || 'N/A'}"`
        ].join(',');
      });

      // Combine headers and rows
      const csvContent = headers.join(',') + '\n' + rows.join('\n');

      // Create a Blob and trigger download
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      const date = new Date().toISOString().split('T')[0];
      link.setAttribute("href", url);
      link.setAttribute("download", `orphan_labels_export_${date}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function printLabel(generatedId, createdAt) {
      if (!generatedId || generatedId === 'null' || generatedId === 'undefined') {
        alert('No Generated ID available to print.');
        return;
      }

      const printWindow = window.open('', '_blank');
      const dateStr = new Date(createdAt).toLocaleString(undefined, {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });

      printWindow.document.write(`
        <!DOCTYPE html>
        <html>
          <head>
            <title>Print Label</title>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></` + `script>
            <style>
              body { font-family: 'Outfit', sans-serif, system-ui; text-align: center; padding: 40px; margin: 0; }
              .container { border: 2px dashed #ccc; padding: 30px; display: inline-block; min-width: 300px; }
              .gen-id { font-size: 28px; font-weight: bold; margin-bottom: 10px; word-break: break-all; font-family: 'Consolas', monospace; }
              .barcode-container { margin: 20px 0; }
              .date { font-size: 16px; color: #555; }
              @media print {
                @page { margin: 0; }
                body { padding: 20px; }
                .container { border: 2px solid #000; padding: 20px; }
              }
            </style>
          </head>
          <body>
            <div class="container">
              <div class="gen-id">${generatedId}</div>
              <div class="barcode-container">
                <svg id="barcode"></svg>
              </div>
              <div class="date">${dateStr}</div>
            </div>
            <script>
              window.onload = function() {
                // Generate the barcode
                JsBarcode("#barcode", "${generatedId}", {
                  format: "CODE128",
                  lineColor: "#000",
                  width: 2,
                  height: 60,
                  displayValue: false // Value is already displayed above the barcode
                });

                // Wait for render, then print
                setTimeout(() => {
                  window.print();
                  window.close();
                }, 500); // Increased timeout slightly to ensure barcode loads
              };
            </` + `script>
          </body>
        </html>
      `);
      printWindow.document.close();
    }

    window.addEventListener('load', loadLabels);
  </script>
</body>
